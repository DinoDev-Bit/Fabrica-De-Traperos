<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .dashboard-card {
            background-color: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            display: none; /* Oculto hasta que carguen los datos */
        }

        .welcome-div {
            background: linear-gradient(135deg, #0f3460, #e94560);
            color: white;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .user-info {
            text-align: left;
            margin-bottom: 2rem;
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        .user-info img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: block;
            margin: 0 auto 1.5rem;
            border: 4px solid #0f3460;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            background-color: white;
        }

        .user-info p {
            margin: 0.8rem 0;
            font-size: 1.05rem;
            color: #495057;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 0.5rem;
        }
        
        .user-info p:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .user-info strong {
            color: #0f3460;
        }

        button {
            width: 100%;
            padding: 0.9rem;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            font-weight: bold;
        }

        button:hover {
            background-color: #c81d3f;
        }
        
        button:active {
            transform: scale(0.98);
        }

        #loading {
            font-size: 1.5rem;
            color: white;
            font-weight: bold;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.6; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1.02); }
        }

        .role-badge {
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            color: white;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .role-admin { background-color: #28a745; }
        .role-editor { background-color: #007bff; }
        .role-viewer { background-color: #6c757d; }

        .permissions-test {
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            text-align: left;
            font-size: 0.95rem;
        }
        .permissions-test h3 {
            margin-top: 0;
            color: #0f3460;
            font-size: 1.1rem;
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 0.5rem;
        }
        .test-case {
            margin: 0.4rem 0;
            padding: 0.4rem 0.6rem;
            border-radius: 4px;
            background: white;
            border: 1px solid #dee2e6;
            display: flex;
            align-items: center;
        }
        .icon-success {
            color: #28a745;
            font-weight: bold;
            margin-right: 0.5rem;
            font-size: 1.2rem;
        }
        .icon-error {
            color: #dc3545;
            font-weight: bold;
            margin-right: 0.5rem;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="loading">Verificando sesión...</div>

    <div class="dashboard-card" id="dashboard-content">
        <div class="welcome-div" id="welcome-message">
            ¡Bienvenido!
        </div>

        <div class="user-info">
            <img id="user-avatar" src="" alt="Avatar del usuario">
            <p><strong>Nombre completo:</strong> <span id="user-name"></span></p>
            <p><strong>Email:</strong> <span id="user-email"></span></p>
            <p><strong>Departamento:</strong> <span id="user-department"></span></p>
            <p><strong>Rol:</strong> <span id="user-role" class="role-badge"></span></p>
        </div>

        <div class="permissions-test" id="permissions-results">
            <h3>Prueba de Permisos</h3>
            <div id="test-list"></div>
        </div>

        <button id="logout-btn">Cerrar sesión</button>
    </div>

    <script>
        // --- PERSISTENCIA DE SESIÓN ---
        // Los navegadores borran las cookies locales al cerrar por seguridad. 
        // Usamos localStorage internamente para garantizar que tu sesión nunca se pierda.
        function getCookie(name) {
            return localStorage.getItem(name);
        }

        function eraseCookie(name) {   
            localStorage.removeItem(name);
        }
        // -----------------------------

        const token = getCookie('token');

        if (!token) {
            window.location.replace('index.html');
        } else if (token.startsWith('local_token_')) {
            // --- LÓGICA LOCAL ---
            const localUser = JSON.parse(getCookie('localUserData'));
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard-content').style.display = 'block';

            document.getElementById('welcome-message').textContent = `¡Hola, ${localUser.firstName}! 🎉 (Cuenta Local)`;
            document.getElementById('user-name').textContent = `${localUser.firstName} ${localUser.lastName}`;
            document.getElementById('user-email').textContent = localUser.email; // Mostramos el CORREO que registró
            document.getElementById('user-department').textContent = 'Local'; 
            
            const roleElement = document.getElementById('user-role');
            roleElement.textContent = 'admin';
            roleElement.className = 'role-badge role-admin';
            
            document.getElementById('user-avatar').src = localUser.image;
        } else {
            // --- LÓGICA DUMMYJSON API ---
            fetch('https://dummyjson.com/auth/me', {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}` 
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Token inválido o expirado');
                }
                return response.json();
            })
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard-content').style.display = 'block';

                // --- PASO 1: Decodificar el JWT manualmente ---
                // En producción, el rol de usuario debe venir incluido dentro del JWT (el payload).
                // Esto permite saber qué permisos tiene el usuario de forma segura sin tener que 
                // hacer una petición extra a la base de datos o API.
                try {
                    const partesToken = token.split('.');
                    if (partesToken.length === 3) {
                        const payloadDecodificado = atob(partesToken[1]);
                        const tokenData = JSON.parse(payloadDecodificado);
                        console.log("Contenido del JWT decodificado:", tokenData);
                    }
                } catch (e) {
                    console.error("Error al decodificar JWT", e);
                }

                // --- PASO 2: Simular el rol según el departamento ---
                const department = (data.company && data.company.department) ? data.company.department : 'N/A';
                let simulatedRole = 'viewer';
                let badgeClass = 'role-viewer';

                if (department === 'Engineering') {
                    simulatedRole = 'admin';
                    badgeClass = 'role-admin';
                } else if (department === 'Marketing') {
                    simulatedRole = 'editor';
                    badgeClass = 'role-editor';
                }

                // --- PASO 3: Mostrar en pantalla ---
                document.getElementById('welcome-message').textContent = `¡Hola, ${data.firstName}! 🎉`;
                document.getElementById('user-name').textContent = `${data.firstName} ${data.lastName}`;
                document.getElementById('user-email').textContent = data.email;
                document.getElementById('user-department').textContent = department;
                
                const roleElement = document.getElementById('user-role');
                roleElement.textContent = simulatedRole;
                roleElement.className = `role-badge ${badgeClass}`;

                document.getElementById('user-avatar').src = data.image;
            })
            .catch(error => {
                console.error("Error de autenticación:", error);
                alert("Tu sesión ha expirado o no es válida. Por favor, inicia sesión nuevamente.");
                
                eraseCookie('token');
                eraseCookie('usuario');
                
                window.location.replace('index.html');
            });
        }

        // --- PASO 1: Tabla de permisos ---
        const PERMISOS = {
            admin:  ['ver_usuarios', 'editar_usuarios', 'eliminar_usuarios', 'ver_reportes', 'configurar_sistema'],
            editor: ['ver_usuarios', 'editar_usuarios', 'ver_reportes'],
            viewer: ['ver_usuarios']
        };

        // --- PASO 2: Función checkPermission ---
        // Diferencia clave entre 401 y 403:
        // 401 (Unauthorized / No Autenticado): El servidor no sabe quién eres. Ej: No enviaste token o expiró.
        // 403 (Forbidden / No Autorizado): El servidor sabe quién eres (estás autenticado), pero tu ROL no tiene permiso para realizar esta acción.
        function checkPermission(rol, accion) {
            // Si el rol no existe, denegar
            if (!PERMISOS[rol]) return false;
            
            // Si la acción está en la lista de permisos del rol, permitir
            if (PERMISOS[rol].includes(accion)) return true;
            
            // Si no pasa la validación anterior, denegar
            return false;
        }

        // --- PASO 3: Probar los 6 casos y mostrarlos en pantalla ---
        const casosPrueba = [
            { rol: 'admin', accion: 'eliminar_usuarios', esperado: true },
            { rol: 'editor', accion: 'eliminar_usuarios', esperado: false },
            { rol: 'viewer', accion: 'ver_reportes', esperado: false },
            { rol: 'admin', accion: 'configurar_sistema', esperado: true },
            { rol: 'viewer', accion: 'ver_usuarios', esperado: true },
            { rol: 'fantasma', accion: 'ver_usuarios', esperado: false }
        ];

        const testList = document.getElementById('test-list');
        casosPrueba.forEach(caso => {
            const resultado = checkPermission(caso.rol, caso.accion);
            
            const div = document.createElement('div');
            div.className = 'test-case';
            
            const icon = resultado ? '<span class="icon-success">✓</span>' : '<span class="icon-error">✗</span>';
            const textoStatus = resultado ? 'PERMITIDO' : 'DENEGADO';
            
            div.innerHTML = `${icon} <span><strong>${caso.rol}</strong> intenta <em>${caso.accion}</em> &rarr; <strong>${textoStatus}</strong></span>`;
            testList.appendChild(div);
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            eraseCookie('token');
            eraseCookie('usuario');
            eraseCookie('localUserData');
            
            window.location.replace('index.html');
        });
    </script>
</body>
</html>
