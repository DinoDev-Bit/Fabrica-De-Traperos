<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .dashboard-card {
            background-color: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            display: none; /* Oculto hasta que carguen los datos */
        }

        .welcome-div {
            background: linear-gradient(135deg, #0f3460, #e94560);
            color: white;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .user-info {
            text-align: left;
            margin-bottom: 2rem;
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        .user-info img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: block;
            margin: 0 auto 1.5rem;
            border: 4px solid #0f3460;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            background-color: white;
        }

        .user-info p {
            margin: 0.8rem 0;
            font-size: 1.05rem;
            color: #495057;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 0.5rem;
        }
        
        .user-info p:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .user-info strong {
            color: #0f3460;
        }

        button {
            width: 100%;
            padding: 0.9rem;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            font-weight: bold;
        }

        button:hover {
            background-color: #c81d3f;
        }
        
        button:active {
            transform: scale(0.98);
        }

        #loading {
            font-size: 1.5rem;
            color: white;
            font-weight: bold;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.6; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1.02); }
        }
    </style>
</head>
<body>

    <!-- Pantalla de carga mientras se valida el token -->
    <div id="loading">Verificando sesión...</div>

    <!-- Contenido principal protegido -->
    <div class="dashboard-card" id="dashboard-content">
        <div class="welcome-div" id="welcome-message">
            ¡Bienvenido!
        </div>

        <div class="user-info">
            <img id="user-avatar" src="" alt="Avatar del usuario">
            <p><strong>Nombre completo:</strong> <span id="user-name"></span></p>
            <p><strong>Email:</strong> <span id="user-email"></span></p>
            <p><strong>Usuario:</strong> <span id="user-username"></span></p>
        </div>

        <button id="logout-btn">Cerrar sesión</button>
    </div>

    <script>
        // 1. Revisar si existe token
        const token = localStorage.getItem('token');

        if (!token) {
            // Si NO hay token en localStorage, el usuario no está autenticado.
            // Redirigimos inmediatamente a la página de login.
            window.location.replace('index.html');
        } else if (token.startsWith('local_token_')) {
            // --- NUEVA LÓGICA PARA USUARIOS LOCALES ---
            const localUser = JSON.parse(localStorage.getItem('localUserData'));
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard-content').style.display = 'block';

            document.getElementById('welcome-message').textContent = `¡Hola, ${localUser.firstName}! 🎉 (Cuenta Local)`;
            document.getElementById('user-name').textContent = `${localUser.firstName} ${localUser.lastName}`;
            document.getElementById('user-email').textContent = 'usuario_local@app.com'; 
            document.getElementById('user-username').textContent = localUser.username;
            document.getElementById('user-avatar').src = localUser.image;
        } else {
            // 2. Hacer fetch a la ruta protegida /auth/me
            
            // --- Explicación de Authorization: Bearer ---
            // "Bearer" significa "portador" en inglés.
            // Al enviar este encabezado, le estamos mostrando nuestra "credencial digital" al servidor.
            // Es el equivalente a mostrar tu pulsera VIP en la entrada de un concierto.
            // Si el token es inválido, falso, o ya caducó (vencido), el servidor nos responderá 
            // con un Error 401 (Unauthorized) y no nos dará la información del usuario.
            
            fetch('https://dummyjson.com/auth/me', {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}` 
                }
            })
            .then(response => {
                if (!response.ok) {
                    // Si responde 401 o cualquier error, lanzamos una excepción para caer en el catch
                    throw new Error('Token inválido o expirado');
                }
                return response.json();
            })
            .then(data => {
                // 3. Mostrar en pantalla los datos que devuelve la API
                
                // Ocultar mensaje de carga y mostrar el panel principal
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard-content').style.display = 'block';

                // Inyectar la información en el HTML
                document.getElementById('welcome-message').textContent = `¡Hola, ${data.firstName}! 🎉`;
                document.getElementById('user-name').textContent = `${data.firstName} ${data.lastName}`;
                document.getElementById('user-email').textContent = data.email;
                document.getElementById('user-username').textContent = data.username;
                document.getElementById('user-avatar').src = data.image;
            })
            .catch(error => {
                // Si llegamos aquí, es porque el token no sirvió o hubo error de red
                console.error("Error de autenticación:", error);
                alert("Tu sesión ha expirado o no es válida. Por favor, inicia sesión nuevamente.");
                
                // Limpiamos los datos inservibles
                localStorage.removeItem('token');
                localStorage.removeItem('usuario');
                
                // Redirigimos al login
                window.location.replace('index.html');
            });
        }

        // 4. Lógica para el botón de "Cerrar sesión"
        document.getElementById('logout-btn').addEventListener('click', () => {
            // Eliminamos la "llave" del usuario y los datos locales simulados
            localStorage.removeItem('token');
            localStorage.removeItem('usuario');
            localStorage.removeItem('localUserData');
            
            
            // Lo enviamos de regreso a la entrada
            window.location.replace('index.html');
        });
    </script>
</body>
</html>
