<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Frontend</title>
    <style>
        /* CSS Básico para un diseño moderno y oscuro */
        body {
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        /* Estilos de la tarjeta blanca centrada */
        .login-card {
            background-color: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 350px;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: #1a1a2e;
        }

        /* Grupo de inputs para separar cada campo */
        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #444;
        }

        /* Estilos de los inputs con borde */
        .input-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1.5px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box; /* Asegura que el padding no cambie el ancho total */
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #0f3460;
        }

        /* Botón azul principal */
        button {
            width: 100%;
            padding: 0.8rem;
            background-color: #0f3460;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            font-weight: bold;
            margin-top: 0.5rem;
        }

        button:hover:not(:disabled) {
            background-color: #e94560;
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Contenedor para mensajes de estado */
        #mensaje {
            margin-top: 1.2rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.5rem;
            border-radius: 5px;
            min-height: 20px;
            transition: all 0.3s;
        }

        /* Animación para sacudir el formulario en caso de error */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        .shake-animation {
            animation: shake 0.4s ease-in-out;
        }
        
        /* Utilidades para pruebas manuales */
        .hint {
            font-size: 0.75rem;
            color: #888;
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <!-- La etiqueta form envuelve los campos, permite enviar datos y detecta la tecla Enter automáticamente -->
    <div class="login-card" id="login-container">
        <h2>Iniciar Sesión</h2>
        <form id="login-form">
            <!-- input-group agrupa la etiqueta (label) y el campo (input) para ordenarlos visualmente -->
            <div class="input-group">
                <label for="username">Usuario</label>
                <!-- input type="text" es para ingresar texto simple -->
                <input type="text" id="username" placeholder="Ej: emilys">
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <!-- input type="password" oculta los caracteres con asteriscos por seguridad -->
                <input type="password" id="password" placeholder="Ej: emilyspass">
            </div>

            <!-- type="submit" indica que este botón envía los datos del formulario -->
            <button type="submit" id="submit-btn">Iniciar sesión</button>
        </form>
        
        <!-- div vacío donde inyectaremos texto (éxito, error, carga) usando JavaScript -->
        <div id="mensaje"></div>
        
        <div style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
            ¿No tienes cuenta? <a href="register.html" style="color: #0f3460; font-weight: bold; text-decoration: none;">Crea una aquí</a>
        </div>
        
        <div class="hint">Usuario de prueba (DummyJSON): emilys / emilyspass</div>
    </div>

    <script>
        // --- Explicación Creativa de Errores HTTP ---
        /*
         * Piensa en internet como si fueras a una pizzería:
         * - Los errores 4xx (como 400 o 404) son "Culpa del Cliente" (tu culpa). 
         *   Es como si pidieras una "pizza de unicornio". El cajero te mira raro y te dice 
         *   "Eso no existe en el menú, te equivocaste" (404 Not Found) o 
         *   "Me pagaste con billetes de Monopoly" (400 Bad Request / 401 Unauthorized). Tú hiciste algo mal.
         * 
         * - Los errores 5xx (como 500) son "Culpa del Servidor" (culpa de la pizzería). 
         *   Es como si pidieras una pizza de pepperoni, pero de repente el horno explota. 
         *   El cajero vuelve lleno de humo y dice "Lo siento, la culpa es nuestra, la cocina colapsó" 
         *   (500 Internal Server Error). El servidor falló a pesar de que tú hiciste todo bien.
         */

        const form = document.querySelector('#login-form');
        const usernameInput = document.querySelector('#username');
        const passwordInput = document.querySelector('#password');
        const mensajeDiv = document.querySelector('#mensaje');
        const submitBtn = document.querySelector('#submit-btn');
        const loginContainer = document.querySelector('#login-container');

        // Al cargar la página, revisamos si ya hay un token guardado en el navegador (persistencia)
        window.onload = () => {
            // Si venimos de crear cuenta, mostramos un aviso
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('registered') === 'true') {
                mensajeDiv.style.color = '#10b981';
                mensajeDiv.textContent = '¡Cuenta creada! Ya puedes iniciar sesión con tu nuevo usuario.';
            }

            const token = localStorage.getItem('token');
            const usuario = localStorage.getItem('usuario');
            if (token && usuario && !urlParams.get('registered')) {
                mensajeDiv.style.color = 'green';
                mensajeDiv.textContent = `Ya tienes sesión activa como ${usuario}.`;
            }
        };

        // Escuchamos el evento "submit" (cuando se presiona el botón o Enter)
        form.addEventListener('submit', async (event) => {
            // preventDefault() detiene el comportamiento por defecto del formulario.
            // Por defecto, HTML recarga toda la página al enviar un form.
            // Al prevenir esto, podemos tomar el control, validar datos y hacer peticiones silenciosas (AJAX/Fetch) sin que la pantalla parpadee.
            event.preventDefault();

            // Quitamos la animación de sacudida por si quedó de un intento fallido anterior
            loginContainer.classList.remove('shake-animation');

            // Leemos los valores que el usuario escribió (trim quita espacios en blanco al inicio y final)
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            // Mostramos en consola el objeto JSON que se enviará
            console.log("Intentando login con usuario:", username);
            console.log("Objeto a enviar:", { username: username, password: password });

            // ESCENARIO 2: Validar campos vacíos (Antes de hacer fetch)
            if (!username || !password) {
                mensajeDiv.style.color = '#d4a017'; // Amarillo oscuro (para legibilidad en fondo blanco)
                mensajeDiv.textContent = 'Por favor completa todos los campos (Client Error)';
                return; // Cortamos la ejecución aquí, no hacemos la petición
            }

            // --- NUEVA LÓGICA: Buscar primero en nuestra base local ---
            const localUsers = JSON.parse(localStorage.getItem('localUsers')) || [];
            const localUserMatch = localUsers.find(u => u.username === username && u.password === password);

            if (localUserMatch) {
                mensajeDiv.style.color = '#10b981'; // Verde
                mensajeDiv.textContent = `¡Login local exitoso! Bienvenido ${localUserMatch.firstName}`;
                
                // Guardamos la sesión local
                localStorage.setItem('token', 'local_token_' + localUserMatch.username);
                localStorage.setItem('usuario', `${localUserMatch.firstName} ${localUserMatch.lastName}`);
                localStorage.setItem('localUserData', JSON.stringify(localUserMatch));

                submitBtn.disabled = true;
                submitBtn.textContent = 'Conectando...';

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
                
                return; // Cortamos la ejecución, no llamamos a DummyJSON
            }
            // --- FIN NUEVA LÓGICA ---

            // Si no es un usuario local, intentamos con DummyJSON
            // Mostramos estado de carga mientras esperamos la respuesta de la API
            mensajeDiv.style.color = '#555';
            mensajeDiv.textContent = 'Cargando...';
            submitBtn.disabled = true; // Deshabilitamos el botón para evitar doble click
            submitBtn.textContent = 'Conectando...';

            const payload = { username, password };

            try {
                // Un HTTP POST es un método de envío. A diferencia de GET (que pide datos por URL), 
                // POST envía la información "oculta" en el cuerpo (body) de la petición.
                // Es indispensable para enviar datos sensibles como contraseñas.
                const response = await fetch('https://dummyjson.com/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // JSON.stringify() toma nuestro objeto JavaScript {username, password} 
                    // y lo convierte en texto formato JSON, que es el "idioma" estándar de las APIs web.
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                // res.ok (o response.ok) devuelve true si el servidor respondió con un código de éxito (200-299).
                // Devuelve false si falló (ej. 400 credenciales malas o 500 servidor roto).
                if (response.ok) { 
                    // ÉXITO (HTTP 200 OK)
                    const shortToken = data.accessToken.substring(0, 30);
                    mensajeDiv.style.color = '#10b981'; // Verde
                    mensajeDiv.textContent = `¡Login exitoso! Token recibido: ${shortToken}... (HTTP 200)`;
                    
                    // Guardamos la sesión en localStorage (memoria del navegador)
                    localStorage.setItem('token', data.accessToken);
                    localStorage.setItem('usuario', `${data.firstName} ${data.lastName}`);

                    // Usamos setTimeout para esperar 1.5 segundos antes de redirigir, 
                    // así el usuario alcanza a leer el mensaje de éxito.
                    setTimeout(() => {
                        mensajeDiv.textContent = `Bienvenido ${data.firstName}! Redirigiendo...`;
                        setTimeout(() => {
                            // Redirigimos a la página protegida
                            window.location.href = 'dashboard.html';
                        }, 1500);
                    }, 800);

                } else {
                    // ESCENARIO 1: Credenciales incorrectas (HTTP 400)
                    mensajeDiv.style.color = '#ef4444'; // Rojo
                    mensajeDiv.textContent = 'Usuario o contraseña incorrectos (Error HTTP 400)';
                    
                    // Pequeño truco: Forzamos un reflow del navegador para que la animación se reinicie
                    // si el usuario se equivoca varias veces seguidas
                    void loginContainer.offsetWidth;
                    loginContainer.classList.add('shake-animation');
                }
            } catch (error) {
                // ESCENARIO 3: Error de Red (El internet se cayó, CORS, servidor apagado)
                mensajeDiv.style.color = '#f97316'; // Naranja
                mensajeDiv.textContent = 'No se pudo conectar con el servidor. Intenta más tarde (Error de Red / Posible 500)';
                console.error("Fallo del Fetch:", error);
            } finally {
                // Se ejecuta siempre, haya fallado o no.
                // Restauramos el botón a su estado normal.
                submitBtn.disabled = false;
                submitBtn.textContent = 'Iniciar sesión';
            }
        });
    </script>
</body>
</html>
