<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Frontend</title>
    <style>
        body {
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .login-card {
            background-color: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 350px;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: #1a1a2e;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #444;
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1.5px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #0f3460;
        }

        button {
            width: 100%;
            padding: 0.8rem;
            background-color: #0f3460;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            font-weight: bold;
            margin-top: 0.5rem;
        }

        button:hover:not(:disabled) {
            background-color: #e94560;
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
            opacity: 0.7;
        }

        #mensaje {
            margin-top: 1.2rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.5rem;
            border-radius: 5px;
            min-height: 20px;
            transition: all 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        .shake-animation {
            animation: shake 0.4s ease-in-out;
        }
        
        .hint {
            font-size: 0.75rem;
            color: #888;
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="login-card" id="login-container">
        <h2>Iniciar Sesión</h2>
        <form id="login-form">
            <div class="input-group">
                <label for="username">Correo o Usuario</label>
                <input type="text" id="username" placeholder="Ej: correo@app.com">
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Ingresa tu contraseña">
            </div>

            <button type="submit" id="submit-btn">Iniciar sesión</button>
        </form>
        
        <div id="mensaje"></div>
        
        <div style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
            ¿No tienes cuenta? <a href="register.html" style="color: #0f3460; font-weight: bold; text-decoration: none;">Crea una aquí</a>
        </div>
        
        <div class="hint">Usuario de prueba (DummyJSON): emilys / emilyspass</div>
    </div>

    <script>
        // --- FUNCIONES DE COOKIES ---
        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                let date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + encodeURIComponent(value) + expires + "; path=/";
        }

        function getCookie(name) {
            let nameEQ = name + "=";
            let ca = document.cookie.split(';');
            for(let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) == 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
            }
            return null;
        }
        // -----------------------------

        const form = document.querySelector('#login-form');
        const usernameInput = document.querySelector('#username');
        const passwordInput = document.querySelector('#password');
        const mensajeDiv = document.querySelector('#mensaje');
        const submitBtn = document.querySelector('#submit-btn');
        const loginContainer = document.querySelector('#login-container');

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('registered') === 'true') {
                mensajeDiv.style.color = '#10b981';
                mensajeDiv.textContent = '¡Cuenta creada! Ya puedes iniciar sesión con tu correo y contraseña.';
            }

            const token = getCookie('token');
            const usuario = getCookie('usuario');
            if (token && usuario && !urlParams.get('registered')) {
                mensajeDiv.style.color = 'green';
                mensajeDiv.textContent = `Ya tienes sesión activa como ${usuario}.`;
            }
        };

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            loginContainer.classList.remove('shake-animation');

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                mensajeDiv.style.color = '#d4a017';
                mensajeDiv.textContent = 'Por favor completa todos los campos (Client Error)';
                return;
            }

            // --- LÓGICA LOCAL ---
            const localUsers = JSON.parse(localStorage.getItem('localUsers')) || [];
            // Validamos contra email local O contra username de DummyJSON
            const localUserMatch = localUsers.find(u => (u.email === username || u.username === username) && u.password === password);

            if (localUserMatch) {
                mensajeDiv.style.color = '#10b981';
                mensajeDiv.textContent = `¡Login local exitoso! Bienvenido ${localUserMatch.firstName}`;
                
                setCookie('token', 'local_token_' + localUserMatch.email, 7);
                setCookie('usuario', `${localUserMatch.firstName} ${localUserMatch.lastName}`, 7);
                setCookie('localUserData', JSON.stringify(localUserMatch), 7);

                submitBtn.disabled = true;
                submitBtn.textContent = 'Conectando...';

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
                
                return;
            }

            // --- LÓGICA DUMMYJSON API ---
            mensajeDiv.style.color = '#555';
            mensajeDiv.textContent = 'Cargando...';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Conectando...';

            const payload = { username, password };

            try {
                const response = await fetch('https://dummyjson.com/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) { 
                    const shortToken = data.accessToken.substring(0, 30);
                    mensajeDiv.style.color = '#10b981';
                    mensajeDiv.textContent = `¡Login exitoso! Token recibido: ${shortToken}... (HTTP 200)`;
                    
                    setCookie('token', data.accessToken, 7);
                    setCookie('usuario', `${data.firstName} ${data.lastName}`, 7);

                    setTimeout(() => {
                        mensajeDiv.textContent = `Bienvenido ${data.firstName}! Redirigiendo...`;
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1500);
                    }, 800);

                } else {
                    mensajeDiv.style.color = '#ef4444';
                    mensajeDiv.textContent = 'Usuario o contraseña incorrectos (Error HTTP 400)';
                    void loginContainer.offsetWidth;
                    loginContainer.classList.add('shake-animation');
                }
            } catch (error) {
                mensajeDiv.style.color = '#f97316';
                mensajeDiv.textContent = 'No se pudo conectar con el servidor. Intenta más tarde (Error de Red / Posible 500)';
                console.error("Fallo del Fetch:", error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Iniciar sesión';
            }
        });
    </script>
</body>
</html>
